services:
  bev-train:
    container_name: bev-train-cu121
    build:
      context: .
      dockerfile: Dockerfile.cu121
    image: bev-train:cu121
    working_dir: /workspace
    volumes:
      - /home/${USER}/docker/bev_train_cu121:/workspace
    stdin_open: true
    tty: true
    command: bash
    # GPU support (Compose v2 with NVIDIA Container Toolkit)
    gpus: all
    # Shared memory
    shm_size: "32gb"
